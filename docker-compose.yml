version: "3.9"

services:
  sse-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: unmapped-sse:v0.3-alpha
    container_name: unmapped_sse
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8080
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
